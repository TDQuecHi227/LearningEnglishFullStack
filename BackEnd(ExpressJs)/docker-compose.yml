version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_auth
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog_auth
    restart: always
    ports:
      - "1025:1025" # SMTP server
      - "8025:8025" # Web UI
    logging:
      driver: 'none' # Reduce noise from mailhog logs if desired

volumes:
  mongo_data:
